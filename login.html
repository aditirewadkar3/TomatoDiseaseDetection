<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CropGuard</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: var(--surface-alt);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .auth-container {
            width: 90%;
            max-width: 1000px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            display: flex;
            overflow: hidden;
            min-height: 600px;
            flex-direction: row-reverse; /* Put banner on right for login */
        }

        .auth-banner {
            flex: 1;
            background: linear-gradient(rgba(27, 94, 32, 0.85), rgba(27, 94, 32, 0.95)), url('https://images.unsplash.com/photo-1586771107445-d3ca888129ff?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80') center/cover;
            padding: 3rem;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }
        
        .auth-banner h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .auth-banner p {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 2rem;
        }

        .auth-form-wrapper {
            flex: 1;
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .auth-header {
            margin-bottom: 2.5rem;
        }

        .auth-header h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: rgba(0,0,0,0.3);
            font-size: 0.8rem;
            margin: 1.5rem 0;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border);
        }

        .divider::before { margin-right: .5em; }
        .divider::after { margin-left: .5em; }

        @media (max-width: 800px) {
            .auth-banner { display: none; }
            .auth-form-wrapper { padding: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-banner">
            <h1>Welcome Back</h1>
            <p>Access your dashboard, manage your fields, and view AI detection history.</p>
        </div>
        
        <div class="auth-form-wrapper">
            <div class="auth-header">
                <h2>Sign In</h2>
                <p class="text-secondary">Log in to your CropGuard account.</p>
            </div>
            
            <form onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-with-icon">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" class="form-control" placeholder="miller@farm.com" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-with-icon">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <div style="text-align: right; margin-top: 0.5rem;">
                        <a href="#" style="font-size: 0.8rem; color: var(--primary);">Forgot password?</a>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.8rem;">
                    Log In <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>

            <div class="divider">OR</div>
            
            <button class="btn btn-light" style="width: 100%;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google" style="width: 16px; margin-right: 8px;"> Continue with Google
            </button>

            <p style="text-align: center; margin-top: 2rem; font-size: 0.9rem;" class="text-secondary">
                Don't have an account? <a href="signup.html" style="color: var(--primary); font-weight: 600;">Create one</a>
            </p>
        </div>
    </div>

</body>
</html>
